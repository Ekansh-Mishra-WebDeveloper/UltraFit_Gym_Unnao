<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>UltraFit Admin | Legal Pages Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ========== GLOBAL STYLES (matches original admin pages) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #121212;
      font-family: 'Montserrat', 'Archivo', sans-serif;
      color: #eaeaea;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }
    :root {
      --gold: #FFD700;
      --gold-glow: 0 0 12px rgba(255,215,0,0.4);
      --dark-bg: #121212;
      --card-bg: rgba(28,28,32,0.88);
      --glass-edge: 1px solid rgba(255,215,0,0.2);
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: transparent;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding: 1.2rem 0;
    }
    .navbar.scrolled {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      padding: 0.7rem 0;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .nav-logo-img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .logo-ultra { color: #ffffff; }
    .logo-fit { color: #FFD700; }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }
    .nav-link {
      color: #f0f0f0;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      padding: 0.5rem 0;
      position: relative;
    }
    .nav-link:not(.join-now-nav):hover { color: #FFD700; }
    .nav-link:not(.join-now-nav)::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: #FFD700;
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }
    .nav-link:not(.join-now-nav):hover::after { transform: scaleX(1); }
    .join-now-nav {
      background: #FFD700;
      color: #121212 !important;
      padding: 0.6rem 1.6rem !important;
      border-radius: 40px;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    .join-now-nav:hover {
      background: #e6c300;
      transform: translateY(-2px);
    }
    .hamburger {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #FFD700;
      min-width: 44px;
      text-align: center;
    }
    @media (max-width: 900px) {
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(12px);
        padding: 1.5rem;
        gap: 1.2rem;
        text-align: center;
      }
      .nav-links.active { display: flex; }
      .hamburger { display: block; }
      .container { padding: 0 1.5rem; }
    }
    /* Legal Hero (same as original) */
    .legal-hero {
      padding: 10rem 0 5rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
      text-align: center;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .legal-title {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #FFD700);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    .legal-subtitle {
      font-size: 1.2rem;
      color: #ccc;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.6;
    }
    /* Tabs for switching legal pages */
    .legal-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0 1rem;
    }
    .tab-btn {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 40px;
      padding: 0.6rem 1.8rem;
      color: #FFD700;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: #FFD700;
      color: #121212;
      border-color: #FFD700;
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255,215,0,0.2);
    }
    /* Admin section styling */
    .admin-legal-card {
      background: rgba(30,30,30,0.7);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,215,0,0.2);
      transition: 0.2s;
      position: relative;
    }
    .admin-legal-card:hover {
      border-color: rgba(255,215,0,0.5);
    }
    .card-header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFD700;
    }
    .card-actions button {
      background: rgba(0,0,0,0.6);
      border: 1px solid #FFD700;
      color: #FFD700;
      border-radius: 40px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: 0.2s;
    }
    .card-actions button:hover {
      background: #FFD700;
      color: #121212;
    }
    .card-content-preview {
      color: #ddd;
      line-height: 1.6;
      max-height: 150px;
      overflow: hidden;
      position: relative;
    }
    .card-content-preview::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: linear-gradient(transparent, rgba(30,30,30,0.9));
    }
    .admin-hero-edit {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 2rem;
    }
    .standard-update-btn {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid #FFD700;
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
      color: #FFD700;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .standard-update-btn:hover {
      background: #FFD700;
      color: #121212;
      transform: scale(1.02);
    }
    .add-section-btn {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 40px;
      padding: 0.6rem 1.5rem;
      color: #FFD700;
      font-weight: 600;
      cursor: pointer;
      margin: 1rem 0 2rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .add-section-btn:hover {
      background: #FFD700;
      color: #121212;
    }
    /* Modals */
    .premium-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    }
    .premium-modal-card {
      background: #121212;
      border: 1px solid #FFD700;
      border-radius: 32px;
      width: 90%;
      max-width: 700px;
      padding: 2rem;
      max-height: 85vh;
      overflow-y: auto;
    }
    .field-group {
      margin-bottom: 1.2rem;
    }
    .field-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.3rem;
    }
    .field-group input, .field-group textarea {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 0.7rem 1rem;
      color: white;
      font-family: inherit;
    }
    .field-group textarea {
      min-height: 200px;
      resize: vertical;
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
    }
    .modal-btn-cancel, .modal-btn-save, .modal-btn-delete {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .modal-btn-cancel {
      background: rgba(100,100,100,0.2);
      border: 1px solid #888;
      color: #ccc;
    }
    .modal-btn-cancel:hover {
      background: #888;
      color: white;
    }
    .modal-btn-save {
      background: #FFD700;
      border: none;
      color: #121212;
    }
    .modal-btn-save:hover {
      background: #e6c300;
      transform: scale(1.02);
    }
    .modal-btn-delete {
      background: rgba(200,0,0,0.2);
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }
    .modal-btn-delete:hover {
      background: #e74c3c;
      color: white;
    }
    .confirm-modal, .success-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5100;
    }
    .confirm-card, .success-card {
      background: #121212;
      border: 1px solid #FFD700;
      border-radius: 32px;
      padding: 2rem;
      text-align: center;
      max-width: 400px;
    }
    .confirm-yes, .confirm-no, .success-card button {
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 0.5rem;
      border: none;
    }
    .confirm-yes {
      background: #FFD700;
      color: #121212;
    }
    .confirm-yes:hover {
      background: #e6c300;
    }
    .confirm-no {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
    }
    .confirm-no:hover {
      background: #444;
      color: white;
    }
    .success-card button {
      background: #FFD700;
      color: #121212;
      margin-top: 1rem;
    }
    .admin-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      color: #FFD700;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 600;
      z-index: 6000;
      transition: transform 0.3s ease;
      border-left: 4px solid #FFD700;
      white-space: nowrap;
    }
    .admin-toast.show { transform: translateX(-50%) translateY(0); }
    footer {
      background: #000;
      padding: 3rem 0;
      border-top: 1px solid rgba(255,215,0,0.3);
      text-align: center;
      margin-top: 3rem;
    }
    .footer-links ul {
      display: flex;
      justify-content: center;
      gap: 2rem;
      list-style: none;
      flex-wrap: wrap;
    }
    .footer-links a { color: #ccc; text-decoration: none; }
    .footer-links a:hover { color: var(--gold); }
    .reorder-buttons {
      display: inline-flex;
      gap: 0.3rem;
      margin-left: 0.5rem;
    }
    .reorder-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid #FFD700;
      color: #FFD700;
      border-radius: 30px;
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="container nav-container">
    <div class="logo-wrapper">
      <img src="UltraFit logo.png" alt="UltraFit Logo" class="nav-logo-img" width="38" height="38" />
      <div class="logo"><span class="logo-ultra">ULTRA</span><span class="logo-fit">FIT</span></div>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="admin.html" class="nav-link">Home</a></li>
      <li><a href="admin.html" class="nav-link join-now-nav">Join Now</a></li>
      <li><a href="admin-diet.html" class="nav-link">Diet Plan</a></li>
      <li><a href="admin-workout.html" class="nav-link">Workout Plan</a></li>
      <li><a href="admin-members.html" class="nav-link">Gym Members</a></li>
      <li><a href="admin-shop.html" class="nav-link">Shop</a></li>
    </ul>
    <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
  </div>
</header>

<main>
  <div class="legal-hero" id="heroSection">
    <div class="container">
      <h1 class="legal-title" id="heroHeading">Privacy Policy</h1>
      <p class="legal-subtitle" id="heroSubheading">Loading...</p>
    </div>
  </div>

  <div class="container">
    <!-- Tabs for switching legal pages -->
    <div class="legal-tabs">
      <button class="tab-btn active" data-page="privacy">Privacy Policy</button>
      <button class="tab-btn" data-page="refund">Refund Policy</button>
      <button class="tab-btn" data-page="terms">Terms & Conditions</button>
    </div>

    <div class="admin-hero-edit">
      <button class="standard-update-btn" id="editHeroBtn"><i class="fas fa-pencil-alt"></i> Edit Hero</button>
    </div>

    <div id="sectionsContainer">
      <!-- sections will be injected here -->
    </div>

    <div style="text-align: center;">
      <button class="add-section-btn" id="addSectionBtn"><i class="fas fa-plus"></i> Add New Section</button>
    </div>
  </div>
</main>

<footer>
  <div class="container footer-grid">
    <div class="footer-links">
      <h4>UltraFit Gym</h4>
      <ul>
        <li><a href="admin-privacy.html">Privacy Policy</a></li>
        <li><a href="admin-refund.html">Refund Policy</a></li>
        <li><a href="admin-terms.html">Terms & Conditions</a></li>
      </ul>
      <p class="credit">Designed by <a href="https://ekansh-mishra-webdeveloper.github.io/Brand-Bazar/" target="_blank">Brand Bazaar</a></p>
    </div>
  </div>
</footer>

<div id="modalContainer" class="premium-modal"></div>
<div id="confirmModal" class="confirm-modal"><div class="confirm-card"><p id="confirmMessage">Are you sure?</p><button class="confirm-yes" id="confirmYesBtn">Yes</button><button class="confirm-no" id="confirmNoBtn">No</button></div></div>
<div id="successModal" class="success-modal"><div class="success-card"><p id="successMessage">Success</p><button id="successOkBtn">OK</button></div></div>
<div id="adminToast" class="admin-toast"></div>

<script>
  // ========== LEGAL PAGES ADMIN ==========
  const API_BASE = '/api';
  let currentPage = 'privacy';
  let currentData = { heroHeading: '', heroSubheading: '', sections: [] };

  function showToast(msg, isError = false) {
    const toast = document.getElementById('adminToast');
    toast.innerText = msg;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#FFD700';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function confirmAction(message) {
    return new Promise((resolve) => {
      const modal = document.getElementById('confirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      const yesBtn = document.getElementById('confirmYesBtn');
      const noBtn = document.getElementById('confirmNoBtn');
      const cleanup = () => {
        yesBtn.removeEventListener('click', yesHandler);
        noBtn.removeEventListener('click', noHandler);
        modal.style.display = 'none';
      };
      const yesHandler = () => { cleanup(); resolve(true); };
      const noHandler = () => { cleanup(); resolve(false); };
      yesBtn.addEventListener('click', yesHandler);
      noBtn.addEventListener('click', noHandler);
    });
  }

  function showSuccessModal(message) {
    return new Promise((resolve) => {
      const modal = document.getElementById('successModal');
      document.getElementById('successMessage').innerText = message;
      modal.style.display = 'flex';
      const okBtn = document.getElementById('successOkBtn');
      const handleOk = () => {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', handleOk);
        resolve();
      };
      okBtn.addEventListener('click', handleOk);
    });
  }

  async function fetchJSON(url, options = {}) {
    try {
      const res = await fetch(url, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers }
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { data = text; }
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    } catch (err) {
      console.error(err);
      showToast(err.message, true);
      return null;
    }
  }

  async function loadLegalPage(page) {
    const data = await fetchJSON(`${API_BASE}/legal/${page}`);
    if (data) {
      currentData = data;
      renderHero();
      renderSections();
    } else {
      // fallback empty structure
      currentData = { heroHeading: page.charAt(0).toUpperCase() + page.slice(1) + ' Policy', heroSubheading: 'Loading...', sections: [] };
      renderHero();
      renderSections();
    }
  }

  function renderHero() {
    document.getElementById('heroHeading').innerText = currentData.heroHeading;
    document.getElementById('heroSubheading').innerText = currentData.heroSubheading;
  }

  function renderSections() {
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = '';
    currentData.sections.forEach((section, idx) => {
      const card = document.createElement('div');
      card.className = 'admin-legal-card';
      card.innerHTML = `
        <div class="card-header-flex">
          <div class="card-title">${escapeHtml(section.title)}</div>
          <div class="card-actions">
            <div class="reorder-buttons">
              ${idx > 0 ? '<button class="reorder-btn" data-move="up"><i class="fas fa-arrow-up"></i></button>' : ''}
              ${idx < currentData.sections.length - 1 ? '<button class="reorder-btn" data-move="down"><i class="fas fa-arrow-down"></i></button>' : ''}
            </div>
            <button class="edit-section-btn" data-idx="${idx}"><i class="fas fa-edit"></i> Edit</button>
            <button class="delete-section-btn" data-idx="${idx}"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </div>
        <div class="card-content-preview">${section.content}</div>
      `;
      container.appendChild(card);
    });
    // attach event listeners for edit/delete/reorder
    document.querySelectorAll('.edit-section-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-idx'));
        openSectionEditor(idx);
      });
    });
    document.querySelectorAll('.delete-section-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.getAttribute('data-idx'));
        if (await confirmAction('Delete this section permanently?')) {
          currentData.sections.splice(idx, 1);
          await saveLegalPage();
          renderSections();
          showToast('Section deleted');
        }
      });
    });
    document.querySelectorAll('.reorder-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const move = btn.getAttribute('data-move');
        const card = btn.closest('.admin-legal-card');
        const idx = Array.from(container.children).indexOf(card);
        if (move === 'up' && idx > 0) {
          [currentData.sections[idx-1], currentData.sections[idx]] = [currentData.sections[idx], currentData.sections[idx-1]];
        } else if (move === 'down' && idx < currentData.sections.length - 1) {
          [currentData.sections[idx], currentData.sections[idx+1]] = [currentData.sections[idx+1], currentData.sections[idx]];
        }
        saveLegalPage().then(() => renderSections());
      });
    });
  }

  async function openSectionEditor(idx) {
    const section = currentData.sections[idx];
    const modal = document.getElementById('modalContainer');
    modal.innerHTML = `
      <div class="premium-modal-card">
        <h3><i class="fas fa-file-alt"></i> Edit Section</h3>
        <div class="field-group"><label>Section Title</label><input type="text" id="sectionTitle" value="${escapeHtml(section.title)}"></div>
        <div class="field-group"><label>Content (HTML supported)</label><textarea id="sectionContent">${escapeHtml(section.content)}</textarea></div>
        <div class="modal-buttons">
          <button class="modal-btn-cancel" id="cancelEdit">Cancel</button>
          <button class="modal-btn-save" id="saveEdit">Save</button>
        </div>
      </div>
    `;
    modal.style.display = 'flex';
    document.getElementById('cancelEdit').onclick = () => modal.style.display = 'none';
    document.getElementById('saveEdit').onclick = async () => {
      const newTitle = document.getElementById('sectionTitle').value;
      const newContent = document.getElementById('sectionContent').value;
      if (!newTitle) { showToast('Title required', true); return; }
      currentData.sections[idx] = { title: newTitle, content: newContent };
      await saveLegalPage();
      modal.style.display = 'none';
      renderSections();
      showToast('Section updated');
    };
  }

  async function addNewSection() {
    const modal = document.getElementById('modalContainer');
    modal.innerHTML = `
      <div class="premium-modal-card">
        <h3><i class="fas fa-plus"></i> Add New Section</h3>
        <div class="field-group"><label>Section Title</label><input type="text" id="newSectionTitle" placeholder="e.g., Information We Collect"></div>
        <div class="field-group"><label>Content (HTML supported)</label><textarea id="newSectionContent" placeholder="Write your content here..."></textarea></div>
        <div class="modal-buttons">
          <button class="modal-btn-cancel" id="cancelAdd">Cancel</button>
          <button class="modal-btn-save" id="confirmAdd">Add Section</button>
        </div>
      </div>
    `;
    modal.style.display = 'flex';
    document.getElementById('cancelAdd').onclick = () => modal.style.display = 'none';
    document.getElementById('confirmAdd').onclick = async () => {
      const title = document.getElementById('newSectionTitle').value;
      const content = document.getElementById('newSectionContent').value;
      if (!title) { showToast('Title required', true); return; }
      currentData.sections.push({ title, content });
      await saveLegalPage();
      modal.style.display = 'none';
      renderSections();
      showToast('Section added');
    };
  }

  async function editHero() {
    const modal = document.getElementById('modalContainer');
    modal.innerHTML = `
      <div class="premium-modal-card">
        <h3>Edit Hero Section</h3>
        <div class="field-group"><label>Heading</label><input type="text" id="heroHeadingInput" value="${escapeHtml(currentData.heroHeading)}"></div>
        <div class="field-group"><label>Subheading</label><input type="text" id="heroSubInput" value="${escapeHtml(currentData.heroSubheading)}"></div>
        <div class="modal-buttons">
          <button class="modal-btn-cancel" id="cancelHero">Cancel</button>
          <button class="modal-btn-save" id="saveHero">Save</button>
        </div>
      </div>
    `;
    modal.style.display = 'flex';
    document.getElementById('cancelHero').onclick = () => modal.style.display = 'none';
    document.getElementById('saveHero').onclick = async () => {
      currentData.heroHeading = document.getElementById('heroHeadingInput').value;
      currentData.heroSubheading = document.getElementById('heroSubInput').value;
      await saveLegalPage();
      modal.style.display = 'none';
      renderHero();
      showToast('Hero updated');
    };
  }

  async function saveLegalPage() {
    const res = await fetchJSON(`${API_BASE}/legal/${currentPage}`, {
      method: 'PUT',
      body: JSON.stringify({
        heroHeading: currentData.heroHeading,
        heroSubheading: currentData.heroSubheading,
        sections: currentData.sections
      })
    });
    if (res) {
      await showSuccessModal('Changes saved successfully');
      return true;
    } else {
      showToast('Save failed', true);
      return false;
    }
  }

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.classList.contains('active')) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPage = btn.getAttribute('data-page');
      await loadLegalPage(currentPage);
    });
  });

  document.getElementById('editHeroBtn').addEventListener('click', editHero);
  document.getElementById('addSectionBtn').addEventListener('click', addNewSection);

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, (m) => {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Navbar scroll & hamburger
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) navbar.classList.add('scrolled');
    else navbar.classList.remove('scrolled');
  });
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  if (hamburger) hamburger.addEventListener('click', () => navLinks.classList.toggle('active'));

  // Initial load
  loadLegalPage('privacy');
</script>
</body>
</html>
